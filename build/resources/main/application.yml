spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/settlement?rewriteBatchedInserts=true
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
  sql:
    init:
      mode: always
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 1000
          order_inserts: true
          order_updates: true

logging:
  level:
    org.springframework.batch: INFO
    com.example: DEBUG
