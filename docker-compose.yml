version: '3.8'

services:
  db:
    image: postgres:15
    container_name: settlement-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: settlement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
